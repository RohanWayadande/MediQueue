<!DOCTYPE html>
<html>
<head>
<title>Hospital Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("https://images.unsplash.com/photo-1586773860418-d37222d8fce3") no-repeat center center/cover;
}

.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    display: flex;
}

.sidebar {
    width: 220px;
    background: rgba(0,0,0,0.85);
    padding: 20px;
    color: white;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #3498db;
    color: white;
}

.content {
    flex: 1;
    padding: 30px;
    color: white;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    margin: 10px 0;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button.save {
    background: #27ae60;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.section { display: none; }
.active { display: block; }

</style>
</head>

<body>

<div class="overlay">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🏥 Menu</h2>

    <button onclick="showSection('hospital')">Hospital</button>
    <button onclick="showSection('doctor')">Doctor</button>
    <button onclick="openAppointments()">Appointments</button>
</div>

<!-- CONTENT -->
<div class="content">

<h1>Hospital Dashboard</h1>

<!-- HOSPITAL -->
<div id="hospital" class="section active card">
    <h2>Hospital Details</h2>

    <input id="hospital_id" placeholder="Hospital UID" disabled>
    <input id="hospital_name" placeholder="Hospital Name">
    <input id="date" type="date">
    <input id="open_time" type="time">
    <input id="close_time" type="time">
    <textarea id="info" placeholder="Hospital Info"></textarea>

    <button class="save" onclick="saveHospital()">Save Hospital</button>
</div>



<!-- DOCTOR -->
<div id="doctor" class="section card">
    <h2>Doctor Details</h2>

    <div id="doctor-section">
        <input class="doctor_name" placeholder="Doctor Name">
        <input class="specialization" placeholder="Specialization">
        <input class="opd_time" placeholder="OPD Time">
        <textarea class="doctor_info" placeholder="Doctor Info"></textarea>
    </div>

    <button class="save" onclick="addDoctor()">+ Add Doctor</button>
</div>

</div>

</div>

<script>

// ---------------- SHOW SECTION ----------------
function showSection(id){
    document.querySelectorAll(".section").forEach(sec=>{
        sec.classList.remove("active");
    });
    document.getElementById(id).classList.add("active");
}

// ---------------- OPEN APPOINTMENTS ----------------
function openAppointments() {
    const uid = localStorage.getItem("uid");

    if (!uid) {
        alert("Login required!");
        return;
    }

    window.location.href = "/appointments/" + uid;
}

// ---------------- ADD DOCTOR ----------------
function addDoctor() {
    const doctorSection = document.getElementById("doctor-section");

    const newDoctor = document.createElement("div");
    newDoctor.innerHTML = `
        <hr>
        <input class="doctor_name" placeholder="Doctor Name">
        <input class="specialization" placeholder="Specialization">
        <input class="opd_time" placeholder="OPD Time">
        <textarea class="doctor_info" placeholder="Doctor Info"></textarea>
    `;

    doctorSection.appendChild(newDoctor);
}

// ---------------- SAVE HOSPITAL ----------------
async function saveHospital() {
    const uid = localStorage.getItem("uid");

    if (!uid) {
        alert("Login required!");
        window.location.href = "login.html";
        return;
    }

    const formData = new FormData();
    formData.append("uid", uid);
    formData.append("hospital_name", document.getElementById("hospital_name").value);
    formData.append("date", document.getElementById("date").value);
    formData.append("open_time", document.getElementById("open_time").value);
    formData.append("close_time", document.getElementById("close_time").value);
    formData.append("info", document.getElementById("info").value);

    document.querySelectorAll(".doctor_name").forEach((el, i) => {
        formData.append("doctor_name", el.value);
        formData.append("specialization", document.querySelectorAll(".specialization")[i].value);
        formData.append("opd_time", document.querySelectorAll(".opd_time")[i].value);
        formData.append("doctor_info", document.querySelectorAll(".doctor_info")[i].value);
    });

    const res = await fetch("http://127.0.0.1:5000/save_hospital", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if (res.ok) {
        alert("Saved successfully");
        window.location.href = "/hospital/" + uid;
    } else {
        alert(data.error || "Save failed");
    }
}

</script>
</body>
</html>
